<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 640px;
            margin: 40px auto;
            padding: 24px;
            border-radius: 8px;
            background: #f3f4f6;
            transition: background-color 0.4s ease;
        }
        body.correct { background-color: #22c55e; color: #fff; }
        body.wrong   { background-color: #ef4444; color: #fff; }
        h1 { margin-top: 0; }
        #question { font-size: 1.25rem; margin-bottom: 16px; }
        .option {
            display: block;
            width: 100%;
            text-align: left;
            margin: 6px 0;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
        }
        .option:hover { background: #e5e7eb; }
        .option:disabled { cursor: default; opacity: 0.7; }
        #progress { color: #6b7280; font-size: 0.9rem; margin-bottom: 12px; }
        #result { text-align: center; }
        #result h2 { font-size: 2rem; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="quiz">
        <div id="progress"></div>
        <h2 id="question"></h2>
        <div id="options"></div>
    </div>

    <div id="result" style="display:none;">
        <h2>Your Score</h2>
        <p id="scoreText"></p>
        <p id="remark"></p>
        <button id="restart">Restart Quiz</button>
    </div>

    <script>
        // Question 3: Interactive multiple-choice quiz with at least 4 questions.
        // Show one question at a time. When the user selects an answer, the
        // background should turn green for correct or red for wrong before
        // moving to the next question. Display the final score and a grade
        // remark at the end.

        const questions = [
            {
                q: "Which language is used to style a web page?",
                options: ["HTML", "CSS", "JavaScript", "Python"],
                answer: 1,
            },
            {
                q: "What does DOM stand for?",
                options: ["Document Object Model", "Data Object Map", "Direct Object Method", "Display Output Mode"],
                answer: 0,
            },
            {
                q: "Which method parses a JSON string into a JavaScript object?",
                options: ["JSON.stringify()", "JSON.parse()", "JSON.toObject()", "JSON.convert()"],
                answer: 1,
            },
            {
                q: "Which symbol is used for an arrow function in modern JavaScript?",
                options: ["=>", "->", "::", "&&"],
                answer: 0,
            },
            {
                q: "Which of these is a JavaScript data type?",
                options: ["Float", "Character", "Boolean", "Double"],
                answer: 2,
            },
        ];

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const progressEl = document.getElementById('progress');
        const quizEl = document.getElementById('quiz');
        const resultEl = document.getElementById('result');
        const scoreTextEl = document.getElementById('scoreText');
        const remarkEl = document.getElementById('remark');
        const restartBtn = document.getElementById('restart');

        let currentIndex = 0;
        let score = 0;
        let acceptingAnswer = true;

        function renderQuestion() {
            acceptingAnswer = true;
            document.body.className = '';

            const current = questions[currentIndex];
            progressEl.textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            questionEl.textContent = current.q;
            optionsEl.innerHTML = '';

            current.options.forEach((text, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = text;
                btn.addEventListener('click', () => handleAnswer(i, btn));
                optionsEl.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, btn) {
            if (!acceptingAnswer) return;
            acceptingAnswer = false;

            const current = questions[currentIndex];
            const correct = selectedIndex === current.answer;

            // Disable all buttons
            optionsEl.querySelectorAll('button').forEach(b => b.disabled = true);

            if (correct) {
                score++;
                document.body.classList.add('correct');
            } else {
                document.body.classList.add('wrong');
                // Highlight the right answer so the user learns
                optionsEl.querySelectorAll('button')[current.answer].style.background = '#bbf7d0';
                btn.style.background = '#fecaca';
            }

            setTimeout(() => {
                currentIndex++;
                if (currentIndex < questions.length) {
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 900);
        }

        function showResult() {
            document.body.className = '';
            quizEl.style.display = 'none';
            resultEl.style.display = 'block';

            const total = questions.length;
            const percent = Math.round((score / total) * 100);

            scoreTextEl.textContent = `${score} / ${total}  (${percent}%)`;

            let remark;
            if (percent >= 80)      remark = "Excellent! 🌟";
            else if (percent >= 60) remark = "Good job 👍";
            else if (percent >= 40) remark = "Fair effort — keep practicing.";
            else                    remark = "Better luck next time.";
            remarkEl.textContent = remark;
        }

        restartBtn.addEventListener('click', () => {
            currentIndex = 0;
            score = 0;
            quizEl.style.display = 'block';
            resultEl.style.display = 'none';
            renderQuestion();
        });

        renderQuestion();
    </script>
</body>
</html>
